<form>
    <div class="form-group">
      <label for="firstName">First Name</label>
      <input id="firstName" type="text" [(ngModel)]="user.first_name" name="firstName" disabled>
    </div>
  
    <div class="form-group">
      <label for="lastName">Last Name</label>
      <input id="lastName" type="text" [(ngModel)]="user.last_name" name="lastName" disabled>
    </div>
  
    <div class="form-group">
      <label for="email">Email</label>
      <input id="email" type="email" [(ngModel)]="user.email" name="email" disabled>
    </div>
  
    <div class="form-group">
      <label for="phone">Phone Number</label>
      <input id="phone" type="text" [(ngModel)]="user.phone_code" name="phoneCode" disabled>
    </div>
  
    <div class="form-group">
      <label for="newPassword">New Password</label>
      <input id="newPassword" type="password" [(ngModel)]="newPassword" name="newPassword" placeholder="Enter new password">
    </div>
  
    <div class="form-group">
      <label for="confirmPassword">Confirm New Password</label>
      <input id="confirmPassword" type="password" [(ngModel)]="confirmPassword" name="confirmPassword" placeholder="Confirm new password">
    </div>
  
    <div class="btn-group">
      <button type="submit" class="btn-save">Save</button>
      <button type="button" class="btn-logout" (click)="logout()">Logout</button>
    </div>
  </form>
